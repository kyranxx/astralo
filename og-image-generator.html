<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OG Image Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0f2e 50%, #0f1729 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: relative;
            overflow: hidden;
        }
        
        /* Stars background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 90px 40px, #fff, transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.8), transparent),
                radial-gradient(3px 3px at 160px 120px, #fbbf24, transparent),
                radial-gradient(2px 2px at 200px 50px, #fff, transparent),
                radial-gradient(2px 2px at 250px 90px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 300px 140px, #fff, transparent),
                radial-gradient(3px 3px at 400px 60px, #fbbf24, transparent),
                radial-gradient(2px 2px at 500px 100px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 600px 40px, #fff, transparent),
                radial-gradient(2px 2px at 700px 80px, rgba(255,255,255,0.6), transparent),
                radial-gradient(3px 3px at 800px 120px, #fbbf24, transparent),
                radial-gradient(2px 2px at 900px 60px, #fff, transparent),
                radial-gradient(2px 2px at 1000px 100px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 1100px 50px, #fff, transparent),
                radial-gradient(2px 2px at 1150px 130px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 100px 300px, #fff, transparent),
                radial-gradient(2px 2px at 200px 400px, rgba(255,255,255,0.6), transparent),
                radial-gradient(3px 3px at 350px 350px, #fbbf24, transparent),
                radial-gradient(2px 2px at 500px 450px, #fff, transparent),
                radial-gradient(2px 2px at 700px 380px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 850px 420px, #fff, transparent),
                radial-gradient(3px 3px at 1000px 350px, #fbbf24, transparent),
                radial-gradient(2px 2px at 1100px 400px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 150px 550px, #fff, transparent),
                radial-gradient(2px 2px at 400px 580px, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 650px 520px, #fff, transparent),
                radial-gradient(2px 2px at 900px 560px, rgba(255,255,255,0.8), transparent);
            opacity: 0.8;
        }
        
        /* Glow effect */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .logo-container {
            position: relative;
            z-index: 10;
            text-align: center;
        }
        
        .logo {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            text-shadow: 0 0 60px rgba(251, 191, 36, 0.5);
            margin-bottom: 20px;
        }
        
        .tagline {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            letter-spacing: 8px;
            text-transform: uppercase;
        }
        
        .stars-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .badge {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 22px;
        }
        
        .badge span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="glow"></div>
    
    <div class="logo-container">
        <div class="stars-icon">✨</div>
        <div class="logo">Astralo</div>
        <div class="tagline">Personalized Horoscopes</div>
        <div class="badge">
            <span>⭐ 50,000+ Customers</span>
            <span>🔮 AI-Powered</span>
            <span>⚡ Instant Delivery</span>
        </div>
    </div>
</body>
</html>
