<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a0f2e"/>
      <stop offset="100%" style="stop-color:#0f1729"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Stars -->
  <circle cx="50" cy="50" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="100" r="1" fill="white" opacity="0.6"/>
  <circle cx="250" cy="80" r="2" fill="#fbbf24" opacity="0.7"/>
  <circle cx="400" cy="120" r="1" fill="white" opacity="0.8"/>
  <circle cx="550" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="700" cy="100" r="2" fill="#fbbf24" opacity="0.7"/>
  <circle cx="850" cy="80" r="1" fill="white" opacity="0.8"/>
  <circle cx="1000" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="1100" cy="120" r="1" fill="white" opacity="0.8"/>
  <circle cx="1150" cy="70" r="2" fill="#fbbf24" opacity="0.7"/>
  
  <circle cx="100" cy="500" r="1" fill="white" opacity="0.6"/>
  <circle cx="300" cy="550" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="500" cy="520" r="2" fill="#fbbf24" opacity="0.7"/>
  <circle cx="750" cy="570" r="1" fill="white" opacity="0.6"/>
  <circle cx="950" cy="530" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="1100" cy="560" r="1" fill="white" opacity="0.6"/>
  
  <!-- Glow effect -->
  <ellipse cx="600" cy="280" rx="300" ry="200" fill="#fbbf24" opacity="0.08"/>
  
  <!-- Sparkle -->
  <text x="600" y="200" text-anchor="middle" font-size="48" fill="#fbbf24" filter="url(#glow)">✨</text>
  
  <!-- Logo -->
  <text x="600" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="110" font-weight="800" fill="url(#gold)" filter="url(#glow)">Astralo</text>
  
  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="rgba(255,255,255,0.9)" letter-spacing="6">PERSONALIZED HOROSCOPES</text>
  
  <!-- Badge line -->
  <text x="600" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.7)">⭐ 50,000+ Customers  •  🔮 AI-Powered  •  ⚡ Instant Delivery</text>
</svg>
